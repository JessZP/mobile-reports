name: Sentry Mobile Report

on:
  schedule:
    # Monday 08:00 America/Sao_Paulo
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      platform:
        description: 'ios, android or both'
        required: false
        default: 'both'
      dryRun:
        description: 'Print report without posting to Teams'
        type: boolean
        required: false
        default: false

jobs:
  sentry-mobile-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and send report
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          args=(--platform "${{ github.event.inputs.platform || 'both' }}")
          if [ "${{ github.event.inputs.dryRun || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi
          node scripts/sentry-mobile-report.mjs "${args[@]}"
